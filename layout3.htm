<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 3</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #header{
            width: 100%;
            min-height: 12vh;
            background-color: rgb(79, 80, 80);
        }
        #A{
            width: 25%;
            min-height: 28vh;
            background-color: rgb(139, 110, 22);
        }
        #B{
            width: 25%;
            min-height: 28vh;
            background-color: rgb(4, 63, 17);
        }
        #C{
            width: 25%;
            min-height: 28vh;
            background-color: rgb(30, 8, 72);
        }
        #D{
            width: 25%;
            min-height: 76vh;
            background-color: rgb(12, 64, 110);
        }
        #E{
            width: 75%;
            min-height: 24vh;
            background-color: rgb(58, 58, 59);
        }
        #F{
            width: 75%;
            min-height: 24vh;
            background-color: rgb(30, 8, 72);
        }
        #footer{
            width: 100%;
            min-height: 12vh;
            background-color: rgb(84, 16, 10);
        }
        #A,#B,#C,#F,#E, #D{
            float: left;
        }
        #D{
            float: right;
        }
        #footer{
            clear: leFT;
        }
    </style>
</head>
<body>
    <div class="main">
        <div>
            <div id="header">Header</div>
            <div id="A">Content A</div>
            <div id="B">Content B</div>
            <div id="C">Content C</div>
            <div id="D">Content D</div>
            <div id="E">Content E</div>
            <div id="F">Content F</div>
            <div id="footer">Footer</div>
        </div>
    </div>
</body>
</html>
