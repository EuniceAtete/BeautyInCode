<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #header{
            width: 100%;
            background-color:rgb(0, 157, 255);
            min-height: 10vh;
        }
        #left-sidebar{
            width: 20%;
            height: 80vh;
            background-color: rgb(90, 91, 102);
        }
        #middle{
            width:60%;
            min-height: 80vh;
            background-color:rgb(56, 26, 132);
        }
        #right-sidebar{
            width: 20%;
            height: 80vh;
            background-color: rgb(243, 148, 33);
        }
        #footer{
            width: 100%;
            min-height: 10vh;
            background-color: rgb(28, 198, 76);
        }
        .container1{
            display: flex;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="header">Header</div>
        <div class="container1">
            <div id="left-sidebar">Sidebar</div>
            <div id="middle">Body</div>
            <div id="right-sidebar">Sidebar</div>
        </div>
        <div id="footer">Footer</div>
    </div>
</body>
</html>
