<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - BeautyInCode</title>

<style>
    body{
        background-color:#121212;
        color:white;
        font-family:'Times New Roman', Times, serif;
        height:100vh;
        margin:0;
        display:flex;
        align-items:center;
        justify-content:center;
    }

    form{
        background-color:#1e1e1e;
        padding:30px;
        border-radius:10px;
        width:320px;
        box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-top:15px;
    }

    input[type="text"],
    input[type="password"]{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:none;
        border-radius:5px;
        background-color:#333;
        color:white;
        outline:none;
    }

    button{
        width:100%;
        padding:10px;
        margin-top:20px;
        border:none;
        border-radius:10px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        background-color:white;
        color:black;
        transition:0.3s;
    }

    button:hover{
        background-color:#000;
        color:white;
        border:1px solid white;
    }

    .signup{
        text-align:center;
        margin-top:15px;
        font-size:14px;
    }

    .signup a{
        color:white;
        font-weight:bold;
        text-decoration:none;
    }

    .signup a:hover{
        text-decoration:underline;
    }
</style>
</head>

<body>

<form method="POST" action="login.php">

    <h2>Login</h2>

    <label for="username">Username</label>
    <input type="text" name="username" id="username" required>

    <label for="password">Password</label>
    <input type="password" name="password" id="password" required>

    <button type="submit">Login</button>

    <div class="signup">
        Don’t have an account? <a href="signup.php">Sign Up</a>
    </div>

</form>

</body>
</html>
