<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeautyInCode</title>
    <style>
        body{
            background-color: #121212;
            color: white;
            font-family:'Times New Roman', Times, serif;
            height: 100vh; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        form{
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
        }

        label{
            display: block;
            margin-top: 20px;
        }

        input[type="radio"]{
            margin-top: 10px;
            margin-right: 5px;
        }

        input[type="checkbox"]{
            margin-top: 10px;
            margin-right: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="password"]{
            background-color: #333;
            color: #fff;
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            border: none;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover{
            background-color: #121212;
            color: #fff;
        }
    </style>
</head>
<body>
    <form method="POST" action="signup.php">
            <h2>Signup form</h2>

            <label for="username">Username: </label>
            <input type="text" name="username" id="username" required>

            <label>Email: </label>
            <input type="email" name="email" id="email" required>

            <label>Age: </label>
            <input type="number" name="age" id="age" min="1" required>

            <label>Gender: </label>
            <input type="radio" name="gender" value="male" required>Male
            <input type="radio" name="gender" value="female">Female

            <label>Password: </label>
            <input type="password" name="password" id="password" required>

            <button type="submit" value="submit">Submit</button>

         </form>
</body>
</html>
